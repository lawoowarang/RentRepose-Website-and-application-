<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rating and Review</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #1E1E1E;
            color: #FFFFFF;
            border: 2px solid #BB86FC;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 300px;
        }

        .rating {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .star {
            font-size: 2em;
            cursor: pointer;
            transition: color 0.2s;
        }

        .star:hover,
        .star.selected {
            color: gold;
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #BB86FC;
            background: #2E2E2E;
            color: #FFFFFF;
            resize: none;
        }

        button {
            background-color: #BB86FC;
            color: #121212;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
        }

        button:hover {
            background-color: #9A68C3;
        }

        .reviews {
            margin-top: 20px;
            text-align: left;
        }

        .review-item {
            border-bottom: 1px solid #BB86FC;
            padding: 10px 0;
            position: relative;
        }

        .review-item:last-child {
            border-bottom: none;
        }

        .review-rating {
            color: gold;
        }

        .delete-btn {
            position: absolute;
            right: 0;
            top: 10px;
            background: #CF6679;
            color: #121212;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
        }

        .delete-btn:hover {
            background: #B55663;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Rate and Review</h1>
        <div class="rating">
            <span class="star" data-value="1">&#9733;</span>
            <span class="star" data-value="2">&#9733;</span>
            <span class="star" data-value="3">&#9733;</span>
            <span class="star" data-value="4">&#9733;</span>
            <span class="star" data-value="5">&#9733;</span>
        </div>
        <textarea id="review" placeholder="Write your review here..."></textarea>
        <button id="submit">Submit</button>
        <div class="reviews" id="reviews">
            <h2>Past Reviews</h2>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const stars = document.querySelectorAll('.star');
            const textarea = document.getElementById('review');
            const submitButton = document.getElementById('submit');
            const reviewsDiv = document.getElementById('reviews');

            let rating = 0;
            let reviews = JSON.parse(localStorage.getItem('reviews')) || [];

            function displayReviews() {
                reviewsDiv.innerHTML = '<h2>Past Reviews</h2>';
                reviews.forEach((review, index) => {
                    const reviewItem = document.createElement('div');
                    reviewItem.classList.add('review-item');
                    reviewItem.innerHTML = `
                        <div class="review-rating">${'&#9733;'.repeat(review.rating)}</div>
                        <div class="review-text">${review.text}</div>
                        <button class="delete-btn" data-index="${index}">Delete</button>
                    `;
                    reviewsDiv.appendChild(reviewItem);
                });

                document.querySelectorAll('.delete-btn').forEach(button => {
                    button.addEventListener('click', (e) => {
                        const index = e.target.getAttribute('data-index');
                        reviews.splice(index, 1);
                        localStorage.setItem('reviews', JSON.stringify(reviews));
                        displayReviews();
                    });
                });
            }

            stars.forEach(star => {
                star.addEventListener('click', () => {
                    rating = star.getAttribute('data-value');
                    stars.forEach(s => s.classList.remove('selected'));
                    for (let i = 0; i < rating; i++) {
                        stars[i].classList.add('selected');
                    }
                });
            });

            submitButton.addEventListener('click', () => {
                const reviewText = textarea.value;
                if (rating && reviewText) {
                    const review = { rating: parseInt(rating), text: reviewText };
                    reviews.push(review);
                    localStorage.setItem('reviews', JSON.stringify(reviews));
                    displayReviews();
                    textarea.value = '';
                    stars.forEach(star => star.classList.remove('selected'));
                    rating = 0;
                } else {
                    alert('Please provide a rating and a review.');
                }
            });

            displayReviews();
        });
    </script>
</body>
</html>
