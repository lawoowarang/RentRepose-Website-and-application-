<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin: 20px 0;
        }

        #map {
            height: 80vh;
            width: 80vw;
        }
    </style>
    <script src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.0197861153647!2d144.96305831563608!3d-37.812150742641594!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad642af0f11fd81%3A0xefb0eb3ff5c5937e!2sFederation%20Square!5e0!3m2!1sen!2sus!4v1616746200125!5m2!1sen!2sus" frameborder="0" async defer></script>
    <script>
        // Fetch addresses from the PHP backend
        async function fetchAddresses() {
            try {
                const response = await fetch('fetch_addresses.php');
                if (response.ok) {
                    const addresses = await response.json();
                    return addresses;
                } else {
                    console.error('Error fetching addresses:', response.statusText);
                    return [];
                }
            } catch (error) {
                console.error('Error fetching addresses:', error);
                return [];
            }
        }

        // Geocode addresses to get latitude and longitude
        async function geocodeAddress(geocoder, address) {
            return new Promise((resolve, reject) => {
                geocoder.geocode({ 'address': address }, (results, status) => {
                    if (status === 'OK') {
                        resolve(results[0].geometry.location);
                    } else {
                        reject('Geocode was not successful for the following reason: ' + status);
                    }
                });
            });
        }

        // Initialize and add the map
        async function initMap() {
            // The location of the initial center of the map
            const initialLocation = { lat: 39.8283, lng: -98.5795 }; // Center of USA

            // The map, centered at initialLocation
            const map = new google.maps.Map(document.getElementById("map"), {
                zoom: 4,
                center: initialLocation
            });

            // Fetch addresses from the database
            const addresses = await fetchAddresses();

            // Create a geocoder instance
            const geocoder = new google.maps.Geocoder();

            // Add markers for each address
            for (const address of addresses) {
                try {
                    const location = await geocodeAddress(geocoder, address);
                    const marker = new google.maps.Marker({
                        position: location,
                        map: map,
                        title: address
                    });
                } catch (error) {
                    console.error(error);
                }
            }
        }
    </script>
</head>
<body>
    <h1>Map</h1>
    <div id="map"></div>
</body>
</html>
